name: Release

# 推送形如 v1.2.0 的标签时触发，自动跨平台打包并创建 GitHub Release。
# 触发方式：git tag v1.2.0 && git push github v1.2.0
on:
  push:
    tags:
      - "v*"

# tauri-action 需要写权限来创建 Release 和上传产物。
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # WebKitGTK 是 Tauri 在 Linux 的 WebView；libappindicator3 供托盘图标(tray-icon)；
      # librsvg2 处理图标；patchelf 用于打包 AppImage；libssl-dev 供 reqwest 默认的 native-tls。
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS 上同时安装两个目标，以便分别产出 Intel 与 Apple Silicon 包。
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Cloudflare Tunnel Manager ${{ github.ref_name }}"
          releaseBody: "下载下方对应平台的安装包即可。"
          # draft=true：各平台产物全部上传到同一草稿 Release 后，再去 Releases 页面手动点 "Publish"，
          # 可避免半成品对外可见。若想完全自动发布，把下面改为 false。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
